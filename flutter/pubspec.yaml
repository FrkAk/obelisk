name: obelisk_app
description: "Obelisk — contextual discovery platform for Munich."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.0.0
  riverpod_annotation: ^2.0.0
  dio: ^5.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.0.0
  mapbox_maps_flutter: ^2.0.0
  go_router: ^14.0.0
  url_launcher: ^6.0.0
  share_plus: ^9.0.0
  geolocator: ^12.0.0
  flutter_markdown: ^0.7.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.0.0
  freezed: ^3.0.0
  json_serializable: ^6.0.0
  riverpod_generator: ^2.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: InstrumentSerif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic

    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Variable.ttf

    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/SourceSerif4-Variable.ttf
        - asset: assets/fonts/SourceSerif4-Italic-Variable.ttf
          style: italic
