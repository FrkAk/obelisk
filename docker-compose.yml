services:
  app:
    build:
      context: .
      target: dev
    user: "1001:1001"
    network_mode: "host"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://obelisk:obelisk_dev@localhost:5432/obelisk
      OLLAMA_URL: http://localhost:11434
      TYPESENSE_URL: http://localhost:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-obelisk_typesense_dev}
      SEARXNG_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy
      searxng:
        condition: service_healthy
    command: bun run dev

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: obelisk_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk -d obelisk"]
      interval: 5s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:30.1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-obelisk_typesense_dev}
      TYPESENSE_SNAPSHOT_INTERVAL_SECONDS: "3600"
      GLOG_minloglevel: "1"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8108' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
      - searxng_data:/data
    environment:
      SEARXNG_BASE_URL: http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  typesense_data:
  searxng_data:
