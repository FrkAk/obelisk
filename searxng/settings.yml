use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - google
      - wikipedia
      - wikidata
      - mojeek
      - mwmbl
      - yep

server:
  secret_key: "obelisk_searxng_dev_key"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  public_instance: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  useragent_suffix: "obelisk-dev"
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  retries: 1
  max_redirects: 10

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    timeout: 12.0

  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: mwmbl
    engine: mwmbl
    shortcut: mw
    disabled: false

  - name: yep
    engine: yep
    shortcut: yp
    disabled: false
