services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: obelisk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: obelisk
      POSTGRES_DB: obelisk
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk -d obelisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: obelisk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: obelisk
      MINIO_ROOT_PASSWORD: obelisk123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: obelisk-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set obelisk http://minio:9000 obelisk obelisk123;
      mc mb --ignore-existing obelisk/obelisk;
      mc anonymous set download obelisk/obelisk/public;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    container_name: obelisk-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  ollama_data:
