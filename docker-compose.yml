services:
  app:
    build: .
    init: true
    command: ["bun", "run", "dev"]
    network_mode: "host"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLLAMA_URL: http://localhost:11434
      TYPESENSE_URL: http://localhost:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: obelisk
      POSTGRES_USER: ${POSTGRES_USER:-obelisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk -d obelisk"]
      interval: 5s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:30.1
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_SNAPSHOT_INTERVAL_SECONDS: "3600"
      GLOG_minloglevel: "1"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8108' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  typesense_data:
