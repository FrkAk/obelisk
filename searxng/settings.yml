use_default_settings:
  engines:
    keep_only:
      - wikipedia
      - wikidata
      - mojeek
      - mwmbl

server:
  secret_key: "obelisk_searxng_dev_key"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  public_instance: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 50
  pool_maxsize: 10
  enable_http2: true
  retries: 2
  max_redirects: 10

engines:
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
    display_type:
      - infobox
      - list

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false
    display_type:
      - infobox
      - list

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: mwmbl
    engine: mwmbl
    shortcut: mw
    disabled: false


